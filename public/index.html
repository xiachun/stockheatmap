<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A股市场一览</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="page">
      <section class="controls">
        <div class="preset-buttons" id="presetButtons">
          <button type="button" class="preset-btn is-active" data-preset="latest">最新</button>
          <button type="button" class="preset-btn" data-preset="1w">过去1周</button>
          <button type="button" class="preset-btn" data-preset="1m">过去1月</button>
          <button type="button" class="preset-btn" data-preset="ytd">今年以来</button>
          <button type="button" class="preset-btn" data-preset="1y">过去1年</button>
          <button type="button" class="preset-btn" data-preset="custom">自定义</button>
        </div>
        <div class="benchmarks-bar" id="benchmarksBar" aria-live="polite"></div>
        <div class="auto-refresh" id="autoRefreshControls">
          <label class="auto-refresh-toggle" id="autoRefreshToggleWrap">
            <input id="autoRefreshToggle" type="checkbox" />
            <span>自动刷新</span>
          </label>
          <select id="autoRefreshInterval">
            <option value="1000">1秒</option>
            <option value="2000" selected>2秒</option>
            <option value="3000">3秒</option>
            <option value="5000">5秒</option>
            <option value="10000">10秒</option>
          </select>
        </div>

        <div class="date-input-wrap">
          <input id="startDate" type="date" disabled />
          <button type="button" class="date-picker-btn" data-target="startDate" aria-label="选择开始日期">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <rect x="3" y="4" width="18" height="17" rx="2" ry="2"></rect>
              <line x1="16" y1="3" x2="16" y2="7"></line>
              <line x1="8" y1="3" x2="8" y2="7"></line>
              <line x1="3" y1="9" x2="21" y2="9"></line>
              <rect x="7.5" y="12.5" width="3" height="3" rx="0.6" ry="0.6"></rect>
              <rect x="13.5" y="12.5" width="3" height="3" rx="0.6" ry="0.6"></rect>
            </svg>
          </button>
        </div>
        <div class="date-input-wrap">
          <input id="endDate" type="date" disabled />
          <button type="button" class="date-picker-btn" data-target="endDate" aria-label="选择结束日期">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <rect x="3" y="4" width="18" height="17" rx="2" ry="2"></rect>
              <line x1="16" y1="3" x2="16" y2="7"></line>
              <line x1="8" y1="3" x2="8" y2="7"></line>
              <line x1="3" y1="9" x2="21" y2="9"></line>
              <rect x="7.5" y="12.5" width="3" height="3" rx="0.6" ry="0.6"></rect>
              <rect x="13.5" y="12.5" width="3" height="3" rx="0.6" ry="0.6"></rect>
            </svg>
          </button>
        </div>
        <button id="refreshBtn" type="button">查询</button>
        <button id="fullscreenBtn" type="button">全屏</button>
      </section>

      <div id="heatmap" class="heatmap"></div>
    </div>
    <script src="/app.js" type="module"></script>
  </body>
</html>
